<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julius · YC Outreach Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --card: #14141e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,101,132,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(67,233,123,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeUp 0.6s ease both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(108,99,255,0.12);
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px;
    color: #9d97ff;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 20px;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 2s infinite;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 16px;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Form Card */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    resize: none;
    width: 100%;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
  }

  input::placeholder, textarea::placeholder { color: #3a3a5a; }

  textarea { min-height: 120px; line-height: 1.6; }

  .generate-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
  }

  .generate-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(108,99,255,0.35); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  /* Output */
  .output-section {
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .output-section.visible { display: block; }

  .output-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .output-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
  }

  .company-tag {
    background: rgba(67,233,123,0.1);
    border: 1px solid rgba(67,233,123,0.25);
    color: var(--accent3);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 100px;
    letter-spacing: 0.04em;
  }

  .messages-grid {
    display: grid;
    gap: 20px;
  }

  .message-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .message-card:hover { border-color: rgba(108,99,255,0.4); }

  .message-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .message-type {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .type-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }

  .type-icon.linkedin { background: rgba(0,119,181,0.15); }
  .type-icon.email { background: rgba(108,99,255,0.15); }

  .type-label {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
  }

  .subject-line {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    font-style: italic;
  }

  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    padding: 7px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,0.08); }
  .copy-btn.copied { border-color: var(--accent3); color: var(--accent3); background: rgba(67,233,123,0.08); }

  .message-body {
    padding: 20px;
    font-size: 14.5px;
    line-height: 1.75;
    color: #c8c8e0;
    white-space: pre-wrap;
    font-weight: 300;
  }

  /* Loading state */
  .loading-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px;
    text-align: center;
  }

  .loading-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: dotPulse 1.4s infinite ease-in-out both;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  .loading-text {
    color: var(--muted);
    font-size: 14px;
    font-style: italic;
  }

  /* History */
  .history-section {
    margin-top: 48px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .history-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .history-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .history-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .history-chip:hover { border-color: var(--accent); color: var(--text); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes dotPulse { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-card { padding: 24px 20px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">YC Outreach Tool</div>
    <h1>Turn any YC startup into<br><span>a personalized pitch</span></h1>
    <p class="subtitle">Paste a company description, get a cold email + LinkedIn note crafted to Julius's proven framework — instantly.</p>
  </header>

  <div class="form-card">
    <div class="form-grid">
      <div class="field">
        <label>Company Name</label>
        <input type="text" id="companyName" placeholder="e.g. NOSO Labs" />
      </div>
      <div class="field">
        <label>Founder / Contact Name</label>
        <input type="text" id="founderName" placeholder="e.g. Pedro" />
      </div>
      <div class="field full">
        <label>Company Description</label>
        <textarea id="companyDesc" placeholder="Paste what the company does — their pitch, YC blurb, website copy, anything..."></textarea>
      </div>
      <div class="field full">
        <label>Any notable stats or facts? <span style="color:#3a3a5a;font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="text" id="companyStats" placeholder="e.g. $6M in debt collected, 10% sales uplift, 500 customers..." />
      </div>
    </div>

    <button class="generate-btn" onclick="generate()" id="genBtn">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">✦ Generate Outreach Messages</span>
    </button>
  </div>

  <!-- Output -->
  <div class="output-section" id="outputSection">
    <div class="output-header">
      <h2>Your Messages</h2>
      <div class="company-tag" id="outputTag"></div>
    </div>
    <div class="messages-grid" id="messagesGrid"></div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-label">Previously generated</div>
    <div class="history-chips" id="historyChips"></div>
  </div>

</div>

<script>
  const history = [];

  async function generate() {
    const company = document.getElementById('companyName').value.trim();
    const founder = document.getElementById('founderName').value.trim();
    const desc = document.getElementById('companyDesc').value.trim();
    const stats = document.getElementById('companyStats').value.trim();

    if (!company || !desc) {
      document.getElementById('companyName').style.borderColor = !company ? '#ff6584' : '';
      document.getElementById('companyDesc').style.borderColor = !desc ? '#ff6584' : '';
      return;
    }

    document.getElementById('companyName').style.borderColor = '';
    document.getElementById('companyDesc').style.borderColor = '';

    const btn = document.getElementById('genBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const outputSection = document.getElementById('outputSection');
    const messagesGrid = document.getElementById('messagesGrid');

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Generating...';

    outputSection.classList.remove('visible');
    messagesGrid.innerHTML = `
      <div class="loading-card">
        <div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="loading-text">Crafting your personalized outreach...</div>
      </div>`;
    outputSection.classList.add('visible');

    const prompt = `You are writing outreach messages on behalf of Julius Adegoke, a frontend engineer with 3 years of experience who just graduated. He wants to offer to work free for 1 month as a trial — if he performs, they keep him; if not, they've lost nothing.

Here is the company info:
- Company name: ${company}
- Founder/contact name: ${founder || '[Founder]'}
- What they do: ${desc}
${stats ? `- Notable stats/facts: ${stats}` : ''}

Julius's background:
- 3 years building production React applications
- Experience with complex UI: animations, 3D web (Three.js + Blender + Next.js), fintech flows
- Built activeinrecovery.org (heavy parallax + scroll animations) and fussy1.vercel.app (full 3D website)
- Moves fast, cares about details

Generate exactly 3 messages. Return ONLY valid JSON — no markdown, no explanation, no backticks.

Format:
{
  "linkedin_note": "...",
  "email_subject": "...",
  "email_body": "..."
}

Rules:
- LinkedIn note: max 280 characters. Intriguing, mentions the company, creates curiosity. Ends with wanting to connect.
- Email subject: punchy, bold, specific to this company
- Email body: Opens with "I'll get straight to the point". Includes the free 1-month offer. Has a "What drew me to [company]" paragraph that is SPECIFIC to what they build — reference what makes their product exciting or impressive${stats ? `, specifically mention: ${stats}` : ''}. Lists 3 bullet points of what Julius brings. Ends with "Worth a conversation?" followed by his name and contact. Keep it tight and hungry.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const raw = data.content.map(i => i.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      renderMessages(parsed, company, founder);

      // Add to history
      history.unshift({ company, founder, desc, stats, parsed });
      updateHistory();

    } catch (err) {
      messagesGrid.innerHTML = `<div class="loading-card"><div class="loading-text" style="color:#ff6584">Something went wrong. Please try again.</div></div>`;
    }

    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = '✦ Generate Outreach Messages';
  }

  function renderMessages(data, company, founder) {
    const grid = document.getElementById('messagesGrid');
    const outputSection = document.getElementById('outputSection');
    document.getElementById('outputTag').textContent = company;

    grid.innerHTML = `
      ${messageCard('linkedin', '🔗', 'LinkedIn Connection Note', '', data.linkedin_note, 'linkedin-msg')}
      ${messageCard('email', '✉️', 'Cold Email', data.email_subject, data.email_body, 'email-msg')}
    `;

    outputSection.classList.add('visible');
    outputSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function messageCard(type, icon, label, subject, body, id) {
    return `
      <div class="message-card">
        <div class="message-header">
          <div class="message-type">
            <div class="type-icon ${type}">${icon}</div>
            <div>
              <div class="type-label">${label}</div>
              ${subject ? `<div class="subject-line">Subject: ${subject}</div>` : ''}
            </div>
          </div>
          <button class="copy-btn" onclick="copyMsg('${id}', this)">
            <span>⎘</span> Copy
          </button>
        </div>
        <div class="message-body" id="${id}">${subject ? `Subject: ${subject}\n\n` : ''}${body}</div>
      </div>`;
  }

  function copyMsg(id, btn) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = '<span>✓</span> Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<span>⎘</span> Copy';
      }, 2000);
    });
  }

  function updateHistory() {
    const section = document.getElementById('historySection');
    const chips = document.getElementById('historyChips');
    if (history.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    chips.innerHTML = history.slice(0, 8).map((item, i) => `
      <div class="history-chip" onclick="reloadHistory(${i})">
        ${item.company}${item.founder ? ' · ' + item.founder : ''}
      </div>`).join('');
  }

  function reloadHistory(i) {
    const item = history[i];
    document.getElementById('companyName').value = item.company;
    document.getElementById('founderName').value = item.founder;
    document.getElementById('companyDesc').value = item.desc;
    document.getElementById('companyStats').value = item.stats;
    document.getElementById('outputTag').textContent = item.company;
    renderMessages(item.parsed, item.company, item.founder);
  }

  // Allow Enter in inputs to trigger generate
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.tagName === 'INPUT') generate();
  });
</script>
</body>
</html>
